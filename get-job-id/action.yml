name: Get Job ID
description: Get the current workflow run's job ID and HTML URL via the GitHub API

inputs:
  github_token:
    default: ${{ github.token }}
    description: GITHUB_TOKEN to use for GitHub API access
    required: false
  job_name:
    description: Name of the job to look up
    required: true
  per_page:
    default: '30'
    description: Results per page (max 100)
    required: false
  repository:
    default: ${{ github.repository }}
    description: Target GitHub repository (owner/repo)
    required: false
  run_id:
    default: ${{ github.run_id }}
    description: Run ID of the target workflow run
    required: false

outputs:
  html_url:
    description: HTML URL of the target job's log
    value: ${{ steps.parse.outputs.html_url }}
  job_id:
    description: Job ID of the target job
    value: ${{ steps.parse.outputs.job_id }}

runs:
  using: composite
  steps:
    - name: Parse Job ID
      id: parse
      shell: bash
      env:
        INPUT_GITHUB_TOKEN: ${{ inputs.github_token }}
        INPUT_JOB_NAME: ${{ inputs.job_name }}
        INPUT_PER_PAGE: ${{ inputs.per_page }}
        INPUT_REPOSITORY: ${{ inputs.repository }}
        INPUT_RUN_ID: ${{ inputs.run_id }}
      run: |
        GITHUB_API="/repos/${INPUT_REPOSITORY}/actions/runs/${INPUT_RUN_ID}/jobs"
        JOBINFO="$(curl --get -Ss \
          -H "Authorization: Bearer ${INPUT_GITHUB_TOKEN}" \
          -H "Accept: application/vnd.github+json" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          "${GITHUB_API_URL}${GITHUB_API}?per_page=${INPUT_PER_PAGE}")"

        if echo "${JOBINFO}" | grep -q "Resource not accessible by integration"; then
          echo "Error: GitHub token does not have sufficient permissions."
          exit 1
        fi

        TOTAL_COUNT="$(echo "${JOBINFO}" | jq -r .total_count)"
        eval "$(echo "${JOBINFO}" | jq -r --arg job_name "${INPUT_JOB_NAME}" \
          '.jobs | map(select(.name == $job_name)) | .[0] | @sh "JOB_ID=\(.id) HTML_URL=\(.html_url)"')"

        if echo "${JOB_ID}" | grep -q "null"; then
          echo "Error: could not find job '${INPUT_JOB_NAME}' (total_count=${TOTAL_COUNT}). Check job_name or per_page."
          exit 1
        fi

        echo "job_id=${JOB_ID}" >> "$GITHUB_OUTPUT"
        echo "html_url=${HTML_URL}" >> "$GITHUB_OUTPUT"
