name: Purge Cache
description: "Delete all GitHub Actions caches for the current repository. Caller needs `actions: write`."

inputs:
  github_token:
    default: ${{ github.token }}
    description: GitHub token for API access
    required: false

runs:
  using: composite
  steps:
    - env:
        GH_TOKEN: ${{ inputs.github_token }}
      name: Delete All Caches
      run: gh cache delete --all --repo "${{ github.repository }}" || true
      shell: bash
