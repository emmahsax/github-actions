name: Go FMT Check
description: Check Go code formatting using gofmt - No caller permissions required

inputs:
  gofmt_flags:
    default: '-l -d'
    description: Flags to pass to gofmt
    required: false
  gofmt_path:
    default: './'
    description: Path for gofmt to check
    required: false

runs:
  using: composite
  steps:
    - env:
        GOFMT_FLAGS: ${{ inputs.gofmt_flags }}
        GOFMT_PATH: ${{ inputs.gofmt_path }}
      name: Check Go formatting
      run: |
        output=$(gofmt $GOFMT_FLAGS $GOFMT_PATH 2>&1) || true
        if [ -n "$output" ]; then
          echo "$output"
          exit 1
        fi
      shell: bash
