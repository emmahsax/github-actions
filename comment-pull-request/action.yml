name: Comment Pull Request
description: Post a comment on a pull request with optional sticky behavior

inputs:
  comment_tag:
    description: A tag used to identify the comment for upsert/delete; when set, the comment becomes "sticky" (subsequent runs update it instead of creating duplicates); when not set, a new comment is created every time
    required: false
  create_if_not_exists:
    description: Whether to create a comment if the tagged comment is not found
    default: 'true'
    required: false
  file_path:
    description: Path to a file whose contents will be used as the comment body
    required: false
  github_token:
    description: GitHub token for API access
    default: ${{ github.token }}
    required: false
  message:
    description: Message to post on the pull request
    required: false
  mode:
    description: Upsert, recreate, delete, or delete-on-completion
    default: upsert
    required: false
  pr_number:
    description: Pull request number (defaults to the current PR from context)
    required: false
  reactions:
    description: Comma-separated reactions to add to the comment (e.g. "+1,rocket")
    required: false

outputs:
  body:
    description: The body of the created or updated comment
    value: ${{ steps.comment.outputs.body }}
  html_url:
    description: The HTML URL of the created or updated comment
    value: ${{ steps.comment.outputs.html_url }}
  id:
    description: The ID of the created or updated comment
    value: ${{ steps.comment.outputs.id }}

runs:
  using: composite
  steps:
    - name: Post or update PR comment
      id: comment
      uses: actions/github-script@v8
      env:
        INPUT_COMMENT_TAG: ${{ inputs.comment_tag }}
        INPUT_CREATE_IF_NOT_EXISTS: ${{ inputs.create_if_not_exists }}
        INPUT_FILE_PATH: ${{ inputs.file_path }}
        INPUT_MESSAGE: ${{ inputs.message }}
        INPUT_MODE: ${{ inputs.mode }}
        INPUT_PR_NUMBER: ${{ inputs.pr_number }}
        INPUT_REACTIONS: ${{ inputs.reactions }}
      with:
        github-token: ${{ inputs.github_token }}
        script: |
          const fs = require('fs');

          const message = process.env.INPUT_MESSAGE || '';
          const filePath = process.env.INPUT_FILE_PATH || '';
          const commentTag = process.env.INPUT_COMMENT_TAG || '';
          const prNumberInput = process.env.INPUT_PR_NUMBER || '';
          const reactions = process.env.INPUT_REACTIONS || '';
          const mode = process.env.INPUT_MODE || 'upsert';
          const createIfNotExists = process.env.INPUT_CREATE_IF_NOT_EXISTS === 'true';

          const VALID_MODES = ['upsert', 'recreate', 'delete', 'delete-on-completion'];
          if (!VALID_MODES.includes(mode)) {
            core.setFailed(`Unknown mode "${mode}". Use upsert, recreate, delete, or delete-on-completion.`);
            return;
          }

          if (!commentTag && (mode === 'delete' || mode === 'delete-on-completion')) {
            core.setFailed('comment-tag is required for delete modes.');
            return;
          }

          if (!message && !filePath && mode !== 'delete') {
            core.setFailed('Either "message" or "file-path" must be provided unless mode is "delete".');
            return;
          }

          let content = message;
          if (!message && filePath) {
            try {
              content = fs.readFileSync(filePath, 'utf8');
            } catch (err) {
              core.setFailed(`Failed to read file "${filePath}": ${err.message}`);
              return;
            }
          }

          const issueNumber = prNumberInput
            ? Number(prNumberInput)
            : context.payload.pull_request?.number || context.payload.issue?.number;

          if (!issueNumber) {
            core.setFailed(
              'Could not determine PR number. Provide pr-number or run from a pull_request event.'
            );
            return;
          }

          const VALID_REACTIONS = ['+1', '-1', 'laugh', 'confused', 'heart', 'hooray', 'rocket', 'eyes'];

          async function addReactions(commentId) {
            if (!reactions) return;
            const all = reactions.replace(/\s/g, '').split(',').filter(Boolean);
            const invalid = all.filter(r => !VALID_REACTIONS.includes(r));
            if (invalid.length) {
              core.warning(`Ignoring invalid reactions: ${invalid.join(', ')}`);
            }
            const items = all.filter(r => VALID_REACTIONS.includes(r));
            await Promise.allSettled(
              items.map(content =>
                github.rest.reactions.createForIssueComment({
                  ...context.repo,
                  comment_id: commentId,
                  content,
                })
              )
            );
          }

          function setOutputs(comment) {
            core.setOutput('id', comment.id);
            core.setOutput('body', comment.body);
            core.setOutput('html-url', comment.html_url);
          }

          const marker = commentTag
            ? `<!-- comment-pull-request "${commentTag}" -->`
            : '';
          const body = marker ? `${content}\n${marker}` : content;

          if (marker) {
            let existing;
            for await (const { data: comments } of github.paginate.iterator(
              github.rest.issues.listComments,
              { ...context.repo, issue_number: issueNumber }
            )) {
              existing = comments.find(c => c.body?.includes(marker));
              if (existing) break;
            }

            if (existing) {
              if (mode === 'upsert') {
                const { data: updated } = await github.rest.issues.updateComment({
                  ...context.repo,
                  comment_id: existing.id,
                  body,
                });
                setOutputs(updated);
                await addReactions(updated.id);
                core.info(`Updated comment ${updated.id}`);
                return;
              } else if (mode === 'recreate') {
                await github.rest.issues.deleteComment({
                  ...context.repo,
                  comment_id: existing.id,
                });
              } else if (mode === 'delete' || mode === 'delete-on-completion') {
                await github.rest.issues.deleteComment({
                  ...context.repo,
                  comment_id: existing.id,
                });
                core.info(`Deleted comment ${existing.id}`);
                return;
              } else {
                core.setFailed(`Unknown mode "${mode}". Use upsert, recreate, delete, or delete-on-completion.`);
                return;
              }
            } else if (mode === 'delete' || mode === 'delete-on-completion') {
              core.info('No comment found with the given tag. Nothing to delete.');
              return;
            } else if (!createIfNotExists) {
              core.info('Tagged comment not found and create-if-not-exists is false. Skipping.');
              return;
            }
          }

          const { data: created } = await github.rest.issues.createComment({
            ...context.repo,
            issue_number: issueNumber,
            body,
          });
          setOutputs(created);
          await addReactions(created.id);
          core.info(`Created comment ${created.id}`);
