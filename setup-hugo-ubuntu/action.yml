name: Setup Hugo (Ubuntu)
description: Install Hugo on Ubuntu runners by downloading from GitHub releases

inputs:
  extended:
    default: 'false'
    description: Whether to install the Hugo extended version (supports SCSS/SASS)
    required: false
  hugo_version:
    default: '0.145.0'
    description: The Hugo version to install (e.g. 0.145.0)
    required: false

runs:
  using: composite
  steps:
    - name: Install Hugo
      shell: bash
      env:
        HUGO_EXTENDED: ${{ inputs.extended }}
        HUGO_VERSION: ${{ inputs.hugo_version }}
      run: |
        if [ "$HUGO_EXTENDED" = "true" ]; then
          BINARY="hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
        else
          BINARY="hugo_${HUGO_VERSION}_linux-amd64.tar.gz"
        fi
        curl -sSfL "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/${BINARY}" \
          | sudo tar -xz -C /usr/local/bin hugo
        hugo version
